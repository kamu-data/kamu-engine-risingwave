# NOTE: RW fails to compile with musl

# Installs packages needed by build.rs files
[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:main"
pre-build = [
    "apt-get update && apt-get install --assume-yes unzip wget openssl libssl-dev",
    # Need to upgrade gcc to a version that does have a bug (because aws-lc-sys's custom build script errors with this:
    #  ### COMPILER BUG DETECTED ###
    #  Your compiler (cc) is not supported due to a memcmp related bug reported in https://gcc.gnu.org/bugzilla/show_bug.cgi?id=95189. We strongly recommend against using this compiler.
    "apt-get -y install gcc-10 && update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 60",
    "wget https://github.com/protocolbuffers/protobuf/releases/download/v26.1/protoc-26.1-linux-x86_64.zip",
    "unzip protoc-26.1-linux-x86_64.zip -d protoc",
    "mv protoc/bin/protoc /usr/bin/",
    "mv protoc/include/* /usr/include/",
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update && apt-get install --assume-yes unzip wget openssl pkg-config libssl-dev:arm64 zlib1g-dev:arm64 libzstd-dev:arm64 liblz4-dev:arm64 libsasl2-dev:arm64 libcurl4-openssl-dev:arm64",
    # Need to upgrade gcc to a version that does have a bug (because aws-lc-sys's custom build script errors with this:
    #  ### COMPILER BUG DETECTED ###
    #  Your compiler (cc) is not supported due to a memcmp related bug reported in https://gcc.gnu.org/bugzilla/show_bug.cgi?id=95189. We strongly recommend against using this compiler.
    "apt-get install -y gcc-10-aarch64-linux-gnu",
    "update-alternatives --install /usr/bin/aarch64-linux-gnu-gcc aarch64-linux-gnu-gcc /usr/bin/aarch64-linux-gnu-gcc-10 60",

    "wget https://github.com/protocolbuffers/protobuf/releases/download/v26.1/protoc-26.1-linux-x86_64.zip",
    "unzip protoc-26.1-linux-x86_64.zip -d protoc",
    "mv protoc/bin/protoc /usr/bin/",
    "mv protoc/include/* /usr/include/",

    "echo 'set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY BOTH)' >> /opt/toolchain.cmake",
    "echo 'set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE BOTH)' >> /opt/toolchain.cmake",

]


# This avoids cross picking up custom linker from ~/.cargo/config.toml
# See: https://github.com/cross-rs/cross/issues/621
[build.env]
passthrough = [
    "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc",
    "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=x86_64-linux-gnu-gcc",
    "RUSTFLAGS",
    "SASL2_STATIC",
    # "CMAKE_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu",
    # "CMAKE_INCLUDE_PATH=/usr/include",
    # "PKG_CONFIG_ALLOW_CROSS=1",
    # "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig",
]
